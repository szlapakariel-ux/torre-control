# Configuración de Railway. Se construye desde la raíz del repo (Root Directory
# del servicio = raíz, el valor por defecto), para que el backend pueda servir
# el frontend estático.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Recordatorio: el volumen persistente (montado en DATA_DIR = /app/backend/data)
# se configura desde el dashboard de Railway, no desde este archivo.
